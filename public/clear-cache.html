<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Limpando cache...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f8f9fd;color:#1a1a2e;text-align:center;padding:2rem}
h1{font-size:1.5rem;margin-bottom:1rem}
p{color:#666;margin-bottom:2rem;line-height:1.5}
.loader{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#1a56db;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1.5rem}
@keyframes spin{to{transform:rotate(360deg)}}
.success{color:#16a34a;font-weight:600}
</style>
</head>
<body>
<div>
<div class="loader" id="loader"></div>
<h1>Limpando cache do navegador...</h1>
<p id="status">Removendo service worker e arquivos em cache...</p>
</div>
<script>
(async function() {
  const status = document.getElementById('status');
  const loader = document.getElementById('loader');
  try {
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const reg of regs) {
        await reg.unregister();
      }
      status.textContent = 'Service worker removido. Limpando caches...';
    }
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
    // Forca limpeza de armazenamento local tambem
    localStorage.clear();
    sessionStorage.clear();
    loader.style.display = 'none';
    status.innerHTML = '✅ Cache limpo com sucesso! Redirecionando...';
    await new Promise(r => setTimeout(r, 1000));
    window.location.href = '/';
  } catch(e) {
    status.textContent = 'Erro: ' + e.message;
    status.style.color = '#dc2626';
  }
})();
</script>
</body>
</html>
